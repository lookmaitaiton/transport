<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <base target="_top">
    
    <title>LOOKMAI TAITON - ขนส่ง</title>
    
    <!-- ⭐️ ไอคอนบนแท็บ (Favicon) ใช้รูปใหม่ที่คุณให้มา -->
    <link rel="icon" type="image/png" href="https://i.postimg.cc/bNfwjxB4/Lookmai-final.png">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/bNfwjxB4/Lookmai-final.png">

    <!-- กำหนดค่า Theme Color ให้เป็นโทนสว่าง -->
    <meta name="theme-color" content="#f8fafc">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="ขนส่งลูกไม้">

    <style>
        /* สไตล์สำหรับหน้าโหลด (Splash Screen) */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #0B1121; /* เปลี่ยนเป็นโทนสีมืด */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            opacity: 1;
            visibility: visible;
            transition: opacity 0.8s ease-in-out, visibility 0.8s ease-in-out;
        }

        /* แอนิเมชันสำหรับโลโก้ */
        .splash-logo {
            width: 280px; /* ขนาดปกติเมื่อสิ้นสุด (ปรับให้ใหญ่ขึ้น) */
            height: auto;
            opacity: 0;
            /* อนิเมชันเริ่มจากใหญ่จางๆ ค่อยๆ ชัดและเล็กลงช้าๆ */
            animation: logoReveal 2.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            border-radius: 24px; 
        }

        @keyframes logoReveal {
            0% {
                transform: scale(3.5); /* เริ่มซูมจากขนาดใหญ่ขึ้นมาก */
                opacity: 0;
            }
            15% {
                opacity: 1;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* คลาสสำหรับสั่งให้หน้าโหลดจางหายไป */
        .fade-out {
            opacity: 0 !important;
            visibility: hidden !important;
        }
    </style>

    <script>
        // ⭐️ สร้าง Manifest สำหรับ PWA (รองรับ Chrome/Android) 
        // เปลี่ยนสีพื้นหลัง/ธีม กลับมาเป็นสีสว่าง (#f8fafc)
        const myManifest = {
            "name": "LOOKMAI TAITON - ขนส่ง",
            "short_name": "LOOKMAI",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#f8fafc",
            "theme_color": "#f8fafc",
            "icons": [
                {
                    "src": "https://i.postimg.cc/bNfwjxB4/Lookmai-final.png",
                    "sizes": "192x192",
                    "type": "image/png",
                    "purpose": "any maskable"
                },
                {
                    "src": "https://i.postimg.cc/bNfwjxB4/Lookmai-final.png",
                    "sizes": "512x512",
                    "type": "image/png",
                    "purpose": "any maskable"
                }
            ]
        };
        
        const manifestLink = document.createElement('link');
        manifestLink.rel = 'manifest';
        manifestLink.href = 'data:application/manifest+json;charset=utf-8,' + encodeURIComponent(JSON.stringify(myManifest));
        document.head.appendChild(manifestLink);
    </script>
</head>
<!-- ปรับพื้นหลังบอดี้ให้เป็นสีสว่าง เพื่อไม่ให้กระทบกับตัวแอปพลิเคชันหลัก -->
<body style="margin: 0; padding: 0; overflow: hidden; background-color: #f8fafc;">
    
    <!-- ส่วนของหน้าโหลด (Splash Screen) ใช้รูปโลโก้เดิมและมีพื้นหลังสีมืดใน CSS -->
    <div id="splash-screen">
        <img src="https://i.postimg.cc/xjsr1jJj/Lookmai.png" alt="Lookmai Logo" class="splash-logo">
    </div>

    <!-- โค้ด iframe ที่ดึงมาจาก Google Apps Script -->
    <iframe style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;" src="https://script.google.com/macros/s/AKfycbz3qxZkLt-9BE6fo9JdXY9folxsFI9MA2dPOQIsyE7K6sgZNhBSEtSsqy8V2BamjsWuMA/exec"></iframe>

    <!-- สคริปต์ควบคุมการซ่อนหน้าโหลด -->
    <script>
        // ให้เวลาแอนิเมชันโลโก้แสดงและรอให้ iframe โหลดเสร็จเบื้องหลัง
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                if (splash) {
                    // สั่งให้หน้าโหลดจางหายไป
                    splash.classList.add('fade-out');
                    
                    // หลังจากจางหายไปสมบูรณ์ (ประมาณ 0.8 วินาทีตามที่ตั้งใน CSS transition) ให้ลบโค้ดส่วนนี้ทิ้งเพื่อไม่ให้บังปุ่มกดต่างๆ
                    setTimeout(() => {
                        splash.remove();
                    }, 800);
                }
            }, 2800); // ตั้งเวลาให้โชว์โลโก้นาน 2.8 วินาที
        });
    </script>
</body>
</html>
